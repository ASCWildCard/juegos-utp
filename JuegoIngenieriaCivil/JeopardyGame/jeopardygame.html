<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Jeopardy Game</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>



<!-- Música -->
<audio id="bgMusic" src="sounds/background.mp3" loop></audio>
<audio id="clickSound" src="sounds/click.mp3"></audio>
<audio id="correctSound" src="sounds/correct.mp3"></audio>
<audio id="wrongSound" src="sounds/wrong.mp3"></audio>
<audio id="winnerSound" src="sounds/winner.mp3"></audio>

<!-- A. HOME -->
<div id="home" class="screen">
    <h1 class="title">JEOPARDY GAME</h1>
    <button onclick="goToSetup()">Empezar</button>
</div>

<!-- B. Registro de  jugadores -->
<div id="setup" class="screen" style="display:none;">
    <h2>Registrar jugadores</h2>

    Jugadores:
    <select id="numPlayers"></select>

    <div id="playerNames"></div>

<button onclick="setupPlayers()">Siguiente</button>
</div>

<!-- B2. Opcion de juego -->

<div id="modeSelection" style="display:none;">
    <h2>¿Qué quieres hacer?</h2>
Categorías:
<input type="number" id="numCategories" value="3" min="1" max="6">

Preguntas por categoría:
<input type="number" id="numQuestions" value="3" min="1" max="5">
<div></div>
<button onclick="showImportSection()">Importar Juego</button>

<div id="importSection" style="display:none; margin-top:10px;">
    <input type="file" id="importFile" accept=".json">
    <button onclick="importSet()">Cargar</button>
</div>

    <button onclick="goToEditor()">Crear Nuevo Juego</button>
    <button onclick="openLibrary()">Seleccionar Juego</button>
</div>


<!-- C1. EDITOR -->
<div id="editor" class="screen" style="display:none;"></div>

<!-- C2. BIBLIOTECA (modal) -->
<div id="libraryModal" class="modal">
    <div class="modal-content">
       
        <div id="savedSets"></div>
        <button onclick="closeLibrary()">Cerrar</button>
    </div>
</div>

<!-- D. JUEGO -->
<div id="game" class="screen" style="display:none;">
    <h2 id="turn"></h2>
    <div id="scoreboard"></div>
    <div id="board"></div>
</div>

<!-- MODAL PREGUNTA -->
<div id="modal" class="modal" style="display:none;">
    <div class="modal-content">
        <h2 id="questionText"></h2>

        <button onclick="showAnswer()">Mostrar Respuesta</button>

        <p id="answerText" style="display:none;"></p>

        <br><br>

        <button onclick="answer(true)">Correcto</button>
        <button onclick="answer(false)">Incorrecto</button>
    </div>
</div>

<!-- MODAL GANADOR -->
<div id="winnerModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h2 id="winnerName"></h2>
        <button onclick="restartGame()">Nuevo Juego</button>
    </div>
</div>

<!-- MODAL TURNO -->
<div id="turnModal" class="turn-modal" style="display:none;">
    <div class="turn-box">
        <h2>🎤 TURNO DE</h2>
        <h1 id="turnPlayerName"></h1>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
